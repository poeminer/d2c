<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Hub (Dark Mode)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #0d1117; /* GitHub Dark canvas background */
            color: #c9d1d9; /* Main text color */
        }

        /* Left Side: Content Preview */
        #content-area {
            flex: 1;
            height: 100%;
            border: none;
            background: #ffffff; /* Keeps iframe content white so its styling isn't broken */
        }

        #placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #8b949e;
            text-align: center;
            background-color: #0d1117;
        }

        #placeholder h2 {
            color: #f0f6fc;
            margin-bottom: 8px;
        }

        /* Right Side: Sidebar Navigation */
        #sidebar {
            width: 300px;
            height: 100%;
            background-color: #161b22; /* Slightly lighter dark for sidebar depth */
            border-left: 1px solid #30363d; /* Subtle dark border */
            display: flex;
            flex-direction: column;
        }

        #sidebar h2 {
            padding: 20px;
            font-size: 1.2rem;
            border-bottom: 1px solid #30363d;
            background-color: #0d1117;
            color: #f0f6fc;
        }

        #page-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        #page-list li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #21262d;
            transition: background 0.2s, color 0.2s;
            color: #c9d1d9;
        }

        #page-list li:hover {
            background-color: #21262d;
            color: #f0f6fc;
        }

        #page-list li.active {
            background-color: #1f6feb; /* GitHub Dark blue accent button color */
            color: #ffffff;
            font-weight: 600;
            border-bottom-color: #1f6feb;
        }
    </style>
</head>
<body>

    <div id="placeholder">
        <h2>Welcome</h2>
        <p>Select a subpage from the sidebar to view it.</p>
    </div>
    <iframe id="content-area" style="display: none;"></iframe>

    <div id="sidebar">
        <h2>Subpages</h2>
        <ul id="page-list"></ul>
    </div>

    <script>
        // --- MANUAL CONFIGURATION ---
        // List your pages here. 
        // 'path' is the actual filename or folder name relative to this file.
        // 'title' is how you want it to look in the sidebar.
        const PAGES = [
            { title: "Area levels", path: "classic_arealevels.html" },
            { title: "Sets and Uniques", path: "SetsAndUniques.html" },
            { title: "Experience at lvl <=24", path: "Sub25Exp.html" },
            { title: "Sets and Uniques Evaluated", path: "SetsAndUniques2.html" },

            
        ];
        // ----------------------------

        const pageList = document.getElementById('page-list');
        const iframe = document.getElementById('content-area');
        const placeholder = document.getElementById('placeholder');

        function loadSidebar() {
            if (PAGES.length === 0) {
                pageList.innerHTML = '<li style="cursor:default; color:#8b949e;">No pages configured.</li>';
                return;
            }

            PAGES.forEach(page => {
                const li = document.createElement('li');
                li.textContent = page.title;

                li.addEventListener('click', () => {
                    // Update active styling
                    document.querySelectorAll('#page-list li').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');

                    // Hide placeholder and show iframe
                    placeholder.style.display = 'none';
                    iframe.style.display = 'block';

                    // CACHE BUSTING FIX: Append a unique timestamp to force a fresh reload
                    const cacheBuster = `?t=${new Date().getTime()}`;
                    iframe.src = page.path + cacheBuster;
                });

                pageList.appendChild(li);
            });
        }

        // Initialize the sidebar
        loadSidebar();
    </script>
</body>
</html>
